<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景：深色 + 微渐变 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08090a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accentGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DA7756" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#DA7756" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1100" cy="140" r="320" fill="url(#accentGlow)"/>

  <!-- 左侧主文案 -->
  <g font-family="-apple-system, 'SF Pro Display', 'PingFang SC', sans-serif">
    <!-- 小标签 "MACOS NATIVE" -->
    <g transform="translate(80, 130)">
      <rect width="150" height="28" rx="14" fill="none" stroke="#DA7756" stroke-width="1.5"/>
      <text x="75" y="19" font-size="12" font-weight="600" fill="#DA7756" text-anchor="middle" letter-spacing="2">MACOS NATIVE</text>
    </g>

    <!-- Logo -->
    <text x="80" y="300" font-size="148" font-weight="700" fill="#e6edf3" letter-spacing="-7">
      cc<tspan fill="#DA7756">IDE</tspan>
    </text>

    <!-- Tagline（宽度控制在 680px 内，避开右侧装饰） -->
    <text x="80" y="380" font-size="30" font-weight="500" fill="#c9d1d9" letter-spacing="-0.4">
      The missing IDE for Claude Code sessions
    </text>

    <!-- Features line -->
    <text x="80" y="420" font-size="18" font-weight="400" fill="#8b949e" letter-spacing="-0.1">
      Full-text search · Multi-terminal grid · 5-tab tool sidebar
    </text>

    <!-- 底部链接 -->
    <text x="80" y="570" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="18" fill="#484f58">
      github.com/sophiaashi/Awesome-ccIDE
    </text>
  </g>

  <!-- 右侧装饰：简化版 ccIDE 主界面示意图 -->
  <g transform="translate(760, 140)">
    <!-- 外框 -->
    <rect x="0" y="0" width="460" height="320" rx="16" fill="#161b22" stroke="#30363d" stroke-width="1"/>

    <!-- 顶部 traffic light -->
    <g transform="translate(16, 16)">
      <circle cx="0" cy="0" r="5.5" fill="#ff5f57"/>
      <circle cx="18" cy="0" r="5.5" fill="#ffbd2e"/>
      <circle cx="36" cy="0" r="5.5" fill="#28c840"/>
    </g>

    <!-- 左列：session 列表 -->
    <g transform="translate(12, 42)">
      <rect x="0" y="0" width="116" height="266" rx="6" fill="#0d1117"/>
      <!-- 搜索框 -->
      <rect x="8" y="10" width="100" height="18" rx="4" fill="#21262d"/>
      <!-- 几条 session 卡片 -->
      <g fill="#161b22">
        <rect x="8" y="38" width="100" height="22" rx="4"/>
        <rect x="8" y="66" width="100" height="22" rx="4"/>
        <rect x="8" y="94" width="100" height="22" rx="4"/>
        <rect x="8" y="122" width="100" height="22" rx="4"/>
        <rect x="8" y="150" width="100" height="22" rx="4"/>
        <rect x="8" y="178" width="100" height="22" rx="4"/>
      </g>
      <!-- 第一条高亮（active） -->
      <rect x="8" y="38" width="100" height="22" rx="4" fill="rgba(218,119,86,0.15)" stroke="#DA7756" stroke-width="0.6"/>
      <rect x="8" y="38" width="2.5" height="22" rx="1" fill="#DA7756"/>
    </g>

    <!-- 中间：2x2 四宫格终端 -->
    <g transform="translate(136, 42)">
      <rect x="0" y="0" width="176" height="266" rx="6" fill="#0a0e14"/>
      <!-- 四个终端 pane -->
      <g fill="#161b22" stroke="#30363d" stroke-width="0.6">
        <rect x="4"  y="4"   width="82" height="128" rx="4"/>
        <rect x="90" y="4"   width="82" height="128" rx="4"/>
        <rect x="4"  y="134" width="82" height="128" rx="4"/>
        <rect x="90" y="134" width="82" height="128" rx="4"/>
      </g>
      <!-- 其中一个带蓝色闪烁环（notify-pulse） -->
      <rect x="90" y="4" width="82" height="128" rx="4" fill="none" stroke="#58A6FF" stroke-width="2"/>
      <rect x="86" y="0" width="90" height="136" rx="5" fill="none" stroke="#58A6FF" stroke-width="1" stroke-opacity="0.45"/>
      <!-- 终端内的横条（模拟文字行） -->
      <g fill="#30363d">
        <rect x="10" y="16" width="70" height="2" rx="1"/>
        <rect x="10" y="22" width="54" height="2" rx="1"/>
        <rect x="10" y="28" width="62" height="2" rx="1"/>

        <rect x="96" y="16" width="70" height="2" rx="1"/>
        <rect x="96" y="22" width="48" height="2" rx="1"/>

        <rect x="10" y="146" width="66" height="2" rx="1"/>
        <rect x="10" y="152" width="52" height="2" rx="1"/>

        <rect x="96" y="146" width="70" height="2" rx="1"/>
        <rect x="96" y="152" width="60" height="2" rx="1"/>
      </g>
    </g>

    <!-- 右列：5-tab 工具栏 -->
    <g transform="translate(320, 42)">
      <rect x="0" y="0" width="128" height="266" rx="6" fill="#0d1117"/>
      <!-- 5 个 tab 行（图标 + 文字条） -->
      <g>
        <g transform="translate(10, 12)">
          <rect width="108" height="22" rx="4" fill="#21262d"/>
          <rect x="8" y="7" width="10" height="8" rx="1.5" fill="none" stroke="#DA7756" stroke-width="1.5"/>
          <rect x="24" y="9" width="56" height="3" rx="1" fill="#DA7756"/>
        </g>
        <g transform="translate(10, 40)" fill="#30363d">
          <rect width="108" height="22" rx="4" fill="#161b22"/>
          <rect x="24" y="9" width="46" height="3" rx="1"/>
          <circle cx="15" cy="11" r="4" fill="none" stroke="#8b949e" stroke-width="1.5"/>
        </g>
        <g transform="translate(10, 68)" fill="#30363d">
          <rect width="108" height="22" rx="4" fill="#161b22"/>
          <rect x="24" y="9" width="54" height="3" rx="1"/>
          <rect x="11" y="7" width="8" height="8" rx="1.5" fill="none" stroke="#8b949e" stroke-width="1.5"/>
        </g>
        <g transform="translate(10, 96)" fill="#30363d">
          <rect width="108" height="22" rx="4" fill="#161b22"/>
          <rect x="24" y="9" width="42" height="3" rx="1"/>
          <circle cx="15" cy="11" r="4" fill="none" stroke="#8b949e" stroke-width="1.5"/>
          <line x1="15" y1="8" x2="15" y2="11" stroke="#8b949e" stroke-width="1.5"/>
          <line x1="15" y1="11" x2="17" y2="12" stroke="#8b949e" stroke-width="1.5"/>
        </g>
        <g transform="translate(10, 124)" fill="#30363d">
          <rect width="108" height="22" rx="4" fill="#161b22"/>
          <rect x="24" y="9" width="38" height="3" rx="1"/>
          <rect x="11" y="7" width="8" height="8" rx="1.5" fill="none" stroke="#8b949e" stroke-width="1.5"/>
        </g>
      </g>
      <!-- 下方模拟 tab 内容区（几条列表项） -->
      <g transform="translate(10, 168)" fill="#161b22">
        <rect width="108" height="14" rx="3"/>
        <rect y="20" width="108" height="14" rx="3"/>
        <rect y="40" width="108" height="14" rx="3"/>
        <rect y="60" width="108" height="14" rx="3"/>
        <rect y="80" width="108" height="14" rx="3"/>
      </g>
    </g>
  </g>
</svg>
